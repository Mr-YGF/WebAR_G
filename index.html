<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>WebAR — 扫描标记看视频</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      max-width: 92vw;
      padding: 10px 14px;
      font: 14px/1.4 system-ui, sans-serif;
      color: #fff;
      background: rgba(0,0,0,.55);
      border-radius: 10px;
      text-align: center;
      pointer-events: none;
    }
    #hint a { pointer-events: auto; }
    #scan-ok {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) scale(0.92);
      z-index: 11;
      padding: 10px 20px;
      font: 15px/1.4 system-ui, sans-serif;
      font-weight: 600;
      color: #fff;
      background: #0d7d5c;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(13,125,92,.45);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity .25s ease, transform .25s ease, visibility .25s;
    }
    #scan-ok.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }
  </style>
</head>
<body>
  <div id="scan-ok" role="status" aria-live="polite">识别成功</div>
  <div id="hint">
    ① 先用 <strong>系统浏览器</strong>（Safari/Chrome）打开<strong>本页</strong>并允许摄像头<br />
    ② 再对准 Hiro 图：本仓库 <a href="print-hiro.html" style="color:#9ef;">print-hiro.html</a> 或 <a href="assets/hiro-marker.jpg" style="color:#9ef;">assets/hiro-marker.jpg</a>，勿用微信扫图<br />
    ③ 图要平、够大、光线均匀；识别到会叠视频与绿盒子
  </div>
  <a-scene
    embedded
    arjs="trackingMethod: best; sourceType: webcam; videoTexture: true; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!-- timeout：视频加载失败/很慢时仍会启动 AR，否则会一直等素材 -->
    <a-assets timeout="5000">
      <video
        id="arvideo"
        src="assets/test.mp4"
        autoplay
        loop
        muted
        playsinline
        webkit-playsinline
        preload="metadata"
      ></video>
    </a-assets>

    <a-marker id="hiro-marker" preset="hiro" emitevents="true">
      <!-- 纯色平面：不依赖视频解码，用于确认「标记已识别」 -->
      <a-plane
        position="0 0.01 0"
        rotation="-90 0 0"
        width="1.6"
        height="0.9"
        color="#ff3355"
        material="transparent: false"
      ></a-plane>
      <!-- 视频叠在红色底上；若 mp4 无法播放至少能看到红底+盒子 -->
      <a-video
        src="#arvideo"
        width="1.6"
        height="0.9"
        position="0 0.02 0"
        rotation="-90 0 0"
      ></a-video>
      <!-- 简单“特效”：半透明描边盒子 -->
      <a-box
        position="0 0.5 0"
        width="1.6"
        height="0.05"
        depth="0.9"
        material="color: #00d4aa; opacity: 0.35; transparent: true"
      ></a-box>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
  <script>
    (function () {
      var toast = document.getElementById('scan-ok');
      var vid = document.getElementById('arvideo');
      function showOk() {
        toast.classList.add('is-visible');
        if (vid && vid.play) vid.play().catch(function () {});
      }
      function hideOk() {
        toast.classList.remove('is-visible');
      }

      /* AR.js 3.x 会在 window 上派发 markerFound / markerLost（仅靠 a-marker 监听常收不到） */
      window.addEventListener('markerFound', showOk);
      window.addEventListener('markerLost', hideOk);

      var marker = document.getElementById('hiro-marker');
      if (marker) {
        marker.addEventListener('markerFound', showOk);
        marker.addEventListener('markerLost', hideOk);
      }
    })();
  </script>
</body>
</html>
