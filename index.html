<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>WebAR — 扫描标记看视频</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      max-width: 92vw;
      padding: 10px 14px;
      font: 14px/1.4 system-ui, sans-serif;
      color: #fff;
      background: rgba(0,0,0,.55);
      border-radius: 10px;
      text-align: center;
      pointer-events: none;
    }
    #hint a { pointer-events: auto; }
    #scan-ok {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) scale(0.92);
      z-index: 11;
      padding: 10px 20px;
      font: 15px/1.4 system-ui, sans-serif;
      font-weight: 600;
      color: #fff;
      background: #0d7d5c;
      border-radius: 999px;
      box-shadow: 0 4px 20px rgba(13,125,92,.45);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity .25s ease, transform .25s ease, visibility .25s;
    }
    #scan-ok.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
    }
    #fix-black {
      position: fixed;
      top: max(52px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      font: 13px system-ui, sans-serif;
      pointer-events: auto;
    }
    #fix-black button {
      font: inherit;
      padding: 8px 14px;
      border: 0;
      border-radius: 8px;
      background: rgba(0,0,0,.65);
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="scan-ok" role="status" aria-live="polite">识别成功</div>
  <div id="fix-black"><button type="button" id="wake-camera">画面黑屏？点一下并允许摄像头</button></div>
  <div id="hint">
    ① 先用 <strong>Safari / Chrome</strong> 打开本页（勿用微信内置浏览器）<br />
    ② Hiro 图：<a href="print-hiro.html" style="color:#9ef;">print-hiro.html</a>
    ③ 打印或大屏显示；对准后应出现<strong>红色面片</strong>与提示<br />
    ④ 追加点「<strong>?debug=1</strong>」可开 AR.js 调试层
  </div>
  <!--
    重要：Hiro 是「图案 marker」，必须用 detectionMode: mono（默认也是 mono）。
    若写 mono_and_matrix + matrixCodeType，是给「条码 marker」用的，Hiro 会永远识别不到。
  -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;"
    arjs="trackingMethod: best; sourceType: webcam; videoTexture: true; detectionMode: mono; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <a-assets timeout="5000">
      <video
        id="arvideo"
        src="assets/test.mp4"
        autoplay
        loop
        muted
        playsinline
        webkit-playsinline
        preload="metadata"
      ></video>
    </a-assets>

    <a-marker id="hiro-marker" preset="hiro" emitevents="true">
      <a-plane
        position="0 0.01 0"
        rotation="-90 0 0"
        width="1.6"
        height="0.9"
        color="#ff3355"
      ></a-plane>
      <a-video
        src="#arvideo"
        width="1.6"
        height="0.9"
        position="0 0.02 0"
        rotation="-90 0 0"
      ></a-video>
      <a-box
        position="0 0.5 0"
        width="1.6"
        height="0.05"
        depth="0.9"
        material="color: #00d4aa; opacity: 0.35; transparent: true"
      ></a-box>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      if (params.get('debug') === '1') {
        var scene = document.querySelector('a-scene');
        if (scene) scene.setAttribute('arjs', 'trackingMethod: best; sourceType: webcam; videoTexture: true; detectionMode: mono; debugUIEnabled: true;');
      }

      var toast = document.getElementById('scan-ok');
      var vid = document.getElementById('arvideo');
      var wakeBtn = document.getElementById('wake-camera');
      var fixWrap = document.getElementById('fix-black');

      function showOk() {
        toast.classList.add('is-visible');
        if (vid && vid.play) vid.play().catch(function () {});
      }
      function hideOk() {
        toast.classList.remove('is-visible');
      }

      window.addEventListener('markerFound', showOk);
      window.addEventListener('markerLost', hideOk);

      var marker = document.getElementById('hiro-marker');
      if (marker) {
        marker.addEventListener('markerFound', showOk);
        marker.addEventListener('markerLost', hideOk);
      }

      wakeBtn.addEventListener('click', function () {
        if (vid && vid.play) vid.play().catch(function () {});
        fixWrap.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
