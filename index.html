<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>WebAR — 扫描标记看视频</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      max-width: 92vw;
      padding: 10px 14px;
      font: 14px/1.4 system-ui, sans-serif;
      color: #fff;
      background: rgba(0,0,0,.55);
      border-radius: 10px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">
    ① 先用 <strong>系统浏览器</strong>（Safari/Chrome）打开<strong>本页</strong>并允许摄像头<br />
    ② 再对准<strong>打印或另一台设备全屏</strong>的 Hiro 图，勿用微信扫图<br />
    ③ 图要平、够大、光线均匀；识别到会叠视频与绿盒子
  </div>
  <a-scene
    embedded
    arjs="trackingMethod: best; sourceType: webcam; videoTexture: true; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <a-assets>
      <video
        id="arvideo"
        src="assets/test.mp4"
        autoplay
        loop
        muted
        playsinline
        preload="auto"
      ></video>
    </a-assets>

    <a-marker preset="hiro">
      <!-- 视频平铺在标记上；宽高比可按你的视频改 width/height -->
      <a-video
        src="#arvideo"
        width="1.6"
        height="0.9"
        position="0 0.02 0"
        rotation="-90 0 0"
      ></a-video>
      <!-- 简单“特效”：半透明描边盒子 -->
      <a-box
        position="0 0.5 0"
        width="1.6"
        height="0.05"
        depth="0.9"
        material="color: #00d4aa; opacity: 0.35; transparent: true"
      ></a-box>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
