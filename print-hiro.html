<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hiro 标记 — 打印 / 全屏</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font: 15px/1.5 system-ui, sans-serif;
      color: #222;
      background: #f2f2f2;
    }
    p { margin: 0 0 12px; max-width: 420px; text-align: center; color: #444; }
    figure {
      margin: 0;
      padding: 12px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
    }
    img {
      display: block;
      max-width: min(92vw, 480px);
      width: 100%;
      height: auto;
    }
    .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button {
      font: inherit;
      padding: 10px 16px;
      border: 0;
      border-radius: 8px;
      background: #0d7d5c;
      color: #fff;
      cursor: pointer;
    }
    button:active { opacity: .9; }
    a { color: #0d7d5c; }
  </style>
</head>
<body>
  <p>下方为 AR.js 官方 <strong>Hiro</strong> 标记。可 <strong>打印</strong>，或在另一台手机用此页 <strong>全屏看图</strong> 供扫描。</p>
  <figure>
    <img src="assets/hiro-marker.jpg" alt="Hiro AR 标记" width="611" height="529" />
  </figure>
  <div class="actions">
    <button type="button" id="fullscreen">全屏显示图片区域</button>
  </div>
  <p style="margin-top:20px;font-size:13px;">源文件：<a href="assets/hiro-marker.jpg">assets/hiro-marker.jpg</a> · <a href="index.html">返回 WebAR</a></p>

  <script>
    document.getElementById('fullscreen').addEventListener('click', function () {
      var fig = document.querySelector('figure');
      if (!fig) return;
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        fig.requestFullscreen().catch(function () {});
      }
    });
  </script>
</body>
</html>
